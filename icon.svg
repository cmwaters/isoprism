<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    Aperture iris icon — f/5.6 style, 6 blades
    Each blade is a D-shaped path (straight inner edge + outer arc),
    rotated 60° apart. Their union covers the full disk except for
    the central hexagonal opening (~32% of the radius), matching
    the f/5.6 aperture blade geometry from the reference diagram.
  -->
  <defs>
    <!-- Clip to the outer circle so blade-edge strokes don't bleed outside -->
    <clipPath id="iris-clip">
      <circle cx="50" cy="50" r="47"/>
    </clipPath>
  </defs>

  <!-- Six aperture blades -->
  <g clip-path="url(#iris-clip)"
     fill="#1a1a1a"
     stroke="#ffffff"
     stroke-width="1.1"
     stroke-linejoin="round">

    <!-- Blade 0 — inner edge at y=37 (13 units above centre) -->
    <path d="M4.83,37 L95.17,37 A47,47 0 0 0 4.83,37Z"/>
    <!-- Blade 1 — rotated 60° -->
    <path d="M4.83,37 L95.17,37 A47,47 0 0 0 4.83,37Z"
          transform="rotate(60,50,50)"/>
    <!-- Blade 2 — rotated 120° -->
    <path d="M4.83,37 L95.17,37 A47,47 0 0 0 4.83,37Z"
          transform="rotate(120,50,50)"/>
    <!-- Blade 3 — rotated 180° -->
    <path d="M4.83,37 L95.17,37 A47,47 0 0 0 4.83,37Z"
          transform="rotate(180,50,50)"/>
    <!-- Blade 4 — rotated 240° -->
    <path d="M4.83,37 L95.17,37 A47,47 0 0 0 4.83,37Z"
          transform="rotate(240,50,50)"/>
    <!-- Blade 5 — rotated 300° -->
    <path d="M4.83,37 L95.17,37 A47,47 0 0 0 4.83,37Z"
          transform="rotate(300,50,50)"/>
  </g>

  <!-- Thin outer ring to frame the icon -->
  <circle cx="50" cy="50" r="47"
          fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
</svg>
