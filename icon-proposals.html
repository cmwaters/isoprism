<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aperture — Icon Proposals</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #e4e4e4;
      padding: 56px 48px;
      color: #111;
    }
    .page-header { margin-bottom: 48px; }
    .page-header h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
    .page-header p  { font-size: 14px; color: #888; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      max-width: 980px;
    }

    .card {
      background: #fff;
      border-radius: 22px;
      padding: 30px 30px 26px;
      box-shadow: 0 1px 2px rgba(0,0,0,.06), 0 4px 20px rgba(0,0,0,.06);
    }

    .card-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .12em;
      color: #bbb; margin-bottom: 2px;
    }
    .card-name { font-size: 20px; font-weight: 650; letter-spacing: -.02em; margin-bottom: 24px; }

    .previews { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 20px; }

    .swatch {
      display: flex; align-items: center; justify-content: center;
      border-radius: 14px; flex-shrink: 0;
    }
    .on-white  { background: #fff; border: 1px solid #e0e0e0; }
    .on-dark   { background: #0d0d0d; }
    .on-blue   { background: #1550f0; }
    .sz-xl     { width: 112px; height: 112px; border-radius: 22px; }
    .sz-md     { width: 68px;  height: 68px;  border-radius: 12px; }
    .sz-sm     { width: 38px;  height: 38px;  border-radius: 8px;  }

    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .tag  {
      background: #f2f2f2; color: #555;
      font-size: 11.5px; font-weight: 500;
      padding: 3px 9px; border-radius: 20px;
    }
    .desc { font-size: 13px; color: #999; line-height: 1.65; }
  </style>
</head>
<body>

<div class="page-header">
  <h1>Aperture — Icon Proposals</h1>
  <p>Triangular blades in a spiral around a central sphere · solid fill · clean geometry</p>
</div>

<div class="grid" id="grid"></div>

<script>
// ─── geometry ─────────────────────────────────────────────────────────────────
//
// Each blade is a TRIANGLE:
//   p1 (outer-leading)  — outerR at angle (i − baseExt) × step
//   p2 (outer-trailing) — outerR at angle (i + 1 + baseExt) × step
//   p3 (inner tip)      — tipR   at angle (i + tipSpin) × step
//
// • baseExt widens the base past the blade's natural sector → blades overlap.
// • tipSpin offsets the tip forward → creates the clockwise spiral.
// • A filled circle (sphere) is drawn on top in the background colour,
//   forming the clean round centre opening.
//
let _uid = 0;

function makeIcon(px, cfg, bladeColor, ringColor, bg) {
  const { n, outerR, tipR, sphereR, baseExt, tipSpin } = cfg;
  const id   = ++_uid;
  const cx   = 50, cy = 50;
  const step = (2 * Math.PI) / n;
  const pt   = (r, t) => [cx + r * Math.cos(t * step), cy + r * Math.sin(t * step)];
  const fmt  = ([x, y]) => `${x.toFixed(2)},${y.toFixed(2)}`;

  let blades = '';
  for (let i = 0; i < n; i++) {
    const p1 = pt(outerR, i        - baseExt);
    const p2 = pt(outerR, i + 1   + baseExt);
    const p3 = pt(tipR,   i + tipSpin);
    blades += `<path d="M${fmt(p1)} L${fmt(p2)} L${fmt(p3)}Z" fill="${bladeColor}"/>`;
  }

  const clipId   = `c${id}`;
  const bgRect   = `<rect width="100" height="100" fill="${bg}"/>`;
  const ringEl   = `<circle cx="${cx}" cy="${cy}" r="${outerR + 4}" fill="none" stroke="${ringColor}" stroke-width="3.5"/>`;
  const sphereEl = `<circle cx="${cx}" cy="${cy}" r="${sphereR}" fill="${bg}"/>`;

  return `<svg xmlns="http://www.w3.org/2000/svg"
               viewBox="0 0 100 100" width="${px}" height="${px}">
    <defs>
      <clipPath id="${clipId}">
        <circle cx="${cx}" cy="${cy}" r="${outerR + 1}"/>
      </clipPath>
    </defs>
    ${bgRect}
    ${ringEl}
    <g clip-path="url(#${clipId})">${blades}</g>
    ${sphereEl}
  </svg>`;
}

// ─── proposals ───────────────────────────────────────────────────────────────

const proposals = [

  // A — 7 blades, matches the reference f/5.6 style
  {
    label: 'A', name: 'Seven Blades',
    tags: ['7 triangles', 'large sphere', 'reference match'],
    desc: 'Seven triangular blades with a generous central sphere — closest match to the reference f/5.6 look. Wide, sweeping blades with a dramatic clockwise spiral.',
    cfg: { n: 7, outerR: 41, tipR: 17, sphereR: 11, baseExt: 0.38, tipSpin: 1.55 },
    samples: [
      { px: 112, blade: '#111', ring: '#111', bg: '#ffffff', cls: 'on-white sz-xl' },
      { px: 112, blade: '#ffffff', ring: '#ffffff', bg: '#0d0d0d', cls: 'on-dark  sz-xl' },
      { px:  68, blade: '#ffffff', ring: '#ffffff', bg: '#1550f0', cls: 'on-blue  sz-md' },
      { px:  38, blade: '#111', ring: '#111', bg: '#ffffff', cls: 'on-white sz-sm' },
    ],
  },

  // B — 6 blades, classic hexagonal feel
  {
    label: 'B', name: 'Six Blades',
    tags: ['6 triangles', 'hexagonal', 'balanced'],
    desc: 'Six blades — the classic camera iris count. The hexagonal arrangement is instantly recognisable and well-balanced at all sizes.',
    cfg: { n: 6, outerR: 41, tipR: 16, sphereR: 11, baseExt: 0.38, tipSpin: 1.55 },
    samples: [
      { px: 112, blade: '#111', ring: '#111', bg: '#ffffff', cls: 'on-white sz-xl' },
      { px: 112, blade: '#ffffff', ring: '#ffffff', bg: '#0d0d0d', cls: 'on-dark  sz-xl' },
      { px:  68, blade: '#ffffff', ring: '#ffffff', bg: '#1550f0', cls: 'on-blue  sz-md' },
      { px:  38, blade: '#111', ring: '#111', bg: '#ffffff', cls: 'on-white sz-sm' },
    ],
  },

  // C — 5 blades, bold and angular
  {
    label: 'C', name: 'Five Blades',
    tags: ['5 triangles', 'bold', 'more angular'],
    desc: 'Five blades create wider, bolder triangles and a pentagonal opening. Each blade is more visually prominent — works especially well as a compact app icon.',
    cfg: { n: 5, outerR: 41, tipR: 15, sphereR: 11, baseExt: 0.40, tipSpin: 1.55 },
    samples: [
      { px: 112, blade: '#111', ring: '#111', bg: '#ffffff', cls: 'on-white sz-xl' },
      { px: 112, blade: '#ffffff', ring: '#ffffff', bg: '#0d0d0d', cls: 'on-dark  sz-xl' },
      { px:  68, blade: '#ffffff', ring: '#ffffff', bg: '#1550f0', cls: 'on-blue  sz-md' },
      { px:  38, blade: '#111', ring: '#111', bg: '#ffffff', cls: 'on-white sz-sm' },
    ],
  },

  // D — 8 blades, refined and symmetric
  {
    label: 'D', name: 'Eight Blades',
    tags: ['8 triangles', 'symmetric', 'refined'],
    desc: 'Eight narrower blades give the most symmetric result — the spiral is tighter and more precise-feeling. The central sphere appears nearly perfectly circular.',
    cfg: { n: 8, outerR: 41, tipR: 17, sphereR: 11, baseExt: 0.32, tipSpin: 1.50 },
    samples: [
      { px: 112, blade: '#111', ring: '#111', bg: '#ffffff', cls: 'on-white sz-xl' },
      { px: 112, blade: '#ffffff', ring: '#ffffff', bg: '#0d0d0d', cls: 'on-dark  sz-xl' },
      { px:  68, blade: '#ffffff', ring: '#ffffff', bg: '#1550f0', cls: 'on-blue  sz-md' },
      { px:  38, blade: '#111', ring: '#111', bg: '#ffffff', cls: 'on-white sz-sm' },
    ],
  },

];

// ─── render ───────────────────────────────────────────────────────────────────
const grid = document.getElementById('grid');

proposals.forEach(p => {
  const card = document.createElement('div');
  card.className = 'card';

  const swatches = p.samples.map(s =>
    `<div class="swatch ${s.cls}">${makeIcon(s.px, p.cfg, s.blade, s.ring, s.bg)}</div>`
  ).join('');

  card.innerHTML = `
    <div class="card-label">Option ${p.label}</div>
    <div class="card-name">${p.name}</div>
    <div class="previews">${swatches}</div>
    <div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <div class="desc">${p.desc}</div>
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
